worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    log_format sentinel '$remote_addr - $time_local "$request" $status "$http_user_agent"';
    access_log /var/log/nginx/access.log sentinel;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        if ($http_user_agent ~* (nmap|nikto|sqlmap|masscan|zgrab)) {
            return 444;
        }

        location = /gateway/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://127.0.0.1:5000/gateway/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        location = /gateway/logout {
            proxy_pass http://127.0.0.1:5000/gateway/logout;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location = /gateway/status {
            proxy_pass http://127.0.0.1:5000/gateway/status;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location = /gateway/health {
            proxy_pass http://127.0.0.1:5000/gateway/health;
            proxy_set_header Host $host;
        }

        location /ws {
            proxy_pass http://127.0.0.1:5000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 120s;
            client_max_body_size 500M;
        }
    }
}
